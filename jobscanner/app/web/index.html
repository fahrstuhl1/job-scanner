<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jobscanner</title>
<style>
  :root {
    --bg:        #0f141a;
    --surface:   #18212b;
    --raised:    #202c38;
    --hair:      #2c3a47;
    --text:      #e6edf3;
    --muted:     #8a9aa8;
    --faint:     #5d6b78;
    --teal:      #46cabb;   /* interactive */
    --teal-dim:  #2c6b65;
    --fresh:     #f2a93b;   /* recency signal */
    --fresh-dim: #6e4f24;
    --radius:    12px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 20px 18px 64px; }

  /* ---- status bar ---- */
  .topbar {
    display: flex; align-items: center; gap: 14px;
    flex-wrap: wrap;
    padding-bottom: 16px; margin-bottom: 18px;
    border-bottom: 1px solid var(--hair);
  }
  .brand {
    font-family: var(--mono);
    font-weight: 600; letter-spacing: 0.14em;
    font-size: 15px; text-transform: uppercase;
    color: var(--text);
  }
  .brand .dot {
    color: var(--teal);
  }
  .chip {
    font-family: var(--mono); font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--hair);
    padding: 4px 9px; border-radius: 999px;
    white-space: nowrap;
  }
  .spacer { flex: 1 1 auto; }
  .status {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
  }
  .led {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--faint); flex: none;
  }
  .status.live .led { background: var(--teal); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(70,202,187,0.55); }
    50%      { box-shadow: 0 0 0 6px rgba(70,202,187,0); }
  }
  button.scan {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.03em;
    color: var(--bg); background: var(--teal);
    border: none; border-radius: 8px;
    padding: 8px 14px; cursor: pointer;
    transition: filter .15s ease, opacity .15s ease;
  }
  button.scan:hover { filter: brightness(1.08); }
  button.scan:disabled { opacity: .5; cursor: default; }
  button.scan:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
  button.scan.secondary {
    color: var(--text); background: var(--surface);
    border: 1px solid var(--hair);
  }
  button.scan.secondary:hover { filter: none; background: var(--raised); }

  /* ---- modal ---- */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    padding: 16px; z-index: 10;
  }
  .modal-backdrop[hidden] { display: none; }
  .modal-backdrop { overflow-y: auto; }
  body.modal-open { overflow: hidden; }
  .modal {
    background: var(--surface); border: 1px solid var(--hair);
    border-radius: var(--radius); padding: 20px; max-width: 360px; width: 100%;
  }
  .modal h3 { margin: 0 0 8px; font-size: 16px; }
  .modal p { margin: 0 0 14px; font-size: 13px; color: var(--muted); }
  .modal label {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: 13px; margin-bottom: 16px;
  }
  .modal input[type="number"] {
    font-family: var(--mono); font-size: 13px;
    color: var(--text); background: var(--raised);
    border: 1px solid var(--hair); border-radius: 8px;
    padding: 6px 9px; width: 70px;
  }
  .modal input[type="number"]:focus { outline: none; border-color: var(--teal-dim); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
  .modal.wide { max-width: 520px; max-height: 86vh; overflow-y: auto; }

  /* ---- settings form ---- */
  button.icon-btn {
    font-size: 16px; line-height: 1;
    color: var(--muted); background: var(--surface);
    border: 1px solid var(--hair); border-radius: 8px;
    padding: 8px 11px; cursor: pointer;
  }
  button.icon-btn:hover { color: var(--text); background: var(--raised); }
  button.icon-btn:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
  .field { margin-bottom: 14px; }
  .field > label {
    display: block; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px;
  }
  .field input[type="text"], .field input[type="number"],
  .field select, .field textarea {
    width: 100%; font-family: var(--sans); font-size: 13px;
    color: var(--text); background: var(--raised);
    border: 1px solid var(--hair); border-radius: 8px;
    padding: 7px 10px;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--teal-dim);
  }
  .field textarea { font-family: var(--mono); resize: vertical; }
  .checkbox-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; margin-bottom: 8px; cursor: pointer;
  }
  .checkbox-row input { width: auto; }
  .search-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .search-row input { flex: 1 1 0; min-width: 0; }
  .search-row .s-query { flex: 1 1 0; }
  .search-row .s-exclude { flex: 1 1 0; }
  .search-row .s-remove { flex: none; }
  .settings-error {
    color: #ef8b8d; font-size: 13px; margin: 4px 0 12px;
  }

  /* ---- stat strip ---- */
  .stats { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
  .stat {
    flex: 1 1 0; min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--hair);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat .num {
    font-family: var(--mono); font-size: 30px; font-weight: 600;
    line-height: 1; letter-spacing: -0.02em;
  }
  .stat.fresh .num { color: var(--fresh); }
  .stat .lbl {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-top: 8px;
  }

  /* ---- tabs + controls ---- */
  .controls {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .tabs { display: inline-flex; background: var(--surface);
          border: 1px solid var(--hair); border-radius: 999px; padding: 3px; }
  .tab {
    font-family: var(--mono); font-size: 13px;
    color: var(--muted); background: none; border: none;
    padding: 6px 16px; border-radius: 999px; cursor: pointer;
  }
  .tab.active { color: var(--bg); background: var(--text); }
  .tab:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
  .grow { flex: 1 1 auto; }
  input.search, select.filter {
    font-family: var(--sans); font-size: 13px;
    color: var(--text); background: var(--surface);
    border: 1px solid var(--hair); border-radius: 8px;
    padding: 8px 11px;
  }
  input.search { min-width: 160px; }
  input.search::placeholder { color: var(--faint); }
  input.search:focus, select.filter:focus { outline: none; border-color: var(--teal-dim); }

  /* ---- job cards ---- */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .card {
    position: relative;
    display: block;
    background: var(--surface);
    border: 1px solid var(--hair);
    border-left: 4px solid var(--hair);
    border-radius: var(--radius);
    padding: 15px 17px 15px 18px;
    text-decoration: none;
    color: inherit;
    transition: border-color .15s ease, background .15s ease;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
  .card:hover { background: var(--raised); }
  .card .title {
    font-size: 16px; font-weight: 600; margin: 0 110px 4px 0;
    color: var(--text);
  }
  .card .employer { color: var(--muted); font-size: 14px; }
  .meta {
    margin-top: 9px; display: flex; flex-wrap: wrap; gap: 6px 14px;
    font-family: var(--mono); font-size: 12px; color: var(--faint);
  }
  .meta .k { color: var(--muted); }
  .dist {
    font-family: var(--mono); font-size: 12px;
    color: var(--teal);
  }
  .seen-badge {
    position: absolute; top: 14px; right: 16px;
    font-family: var(--mono); font-size: 11px;
    color: var(--fresh);
  }
  .card.archived .seen-badge { color: var(--faint); }
  .view-arrow {
    position: absolute; right: 16px; bottom: 14px;
    font-family: var(--mono); font-size: 12px;
    color: var(--teal);
  }
  .card-btn {
    font-family: var(--mono); font-size: 11px;
    color: var(--muted); background: var(--raised);
    border: 1px solid var(--hair); border-radius: 999px;
    padding: 3px 9px; cursor: pointer;
    transition: color .15s ease, border-color .15s ease;
  }
  .card-btn:hover { color: var(--text); border-color: var(--teal-dim); }
  .card-btn.active { color: var(--fresh); border-color: var(--fresh-dim); }
  .card-btn:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
  .load-more { display: block; margin: 14px auto 0; }

  /* ---- empty / loading ---- */
  .empty {
    text-align: center; padding: 56px 20px; color: var(--muted);
    border: 1px dashed var(--hair); border-radius: var(--radius);
  }
  .empty .big { font-size: 15px; color: var(--text); margin-bottom: 6px; }
  .empty .sub { font-size: 13px; }

  .card { animation: rise .25s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .status.live .led { animation: none; }
  }
  @media (max-width: 560px) {
    .card .title { margin-right: 0; }
    .seen-badge { position: static; display: block; margin-bottom: 6px; }
    .view-arrow { position: static; display: inline-block; margin-top: 10px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <button class="icon-btn" id="settingsBtn" title="Sucheinstellungen">☰</button>
    <span class="brand">Job<span class="dot">·</span>Scanner</span>
    <span class="chip" id="loc">–</span>
    <span class="spacer"></span>
    <span class="status" id="status"><span class="led"></span><span id="statusText">–</span></span>
    <button class="scan secondary" id="deepBtn" title="Auch ältere Stellen nachladen">Tiefensuche</button>
    <button class="scan" id="scanBtn">Jetzt scannen</button>
  </header>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal">
      <h3>Tiefensuche</h3>
      <p>Lädt zusätzlich Stellen, die schon länger als das übliche Fenster
         veröffentlicht sind – nützlich beim ersten Scan oder nach längerer
         Pause.</p>
      <label>Veröffentlicht in den letzten
        <input type="number" id="deepDays" min="0" max="90" value="30">
        Tagen</label>
      <div class="modal-actions">
        <button class="scan secondary" id="deepCancel">Abbrechen</button>
        <button class="scan" id="deepStart">Starten</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="settingsBackdrop" hidden>
    <div class="modal wide">
      <h3>Sucheinstellungen</h3>
      <div class="settings-error" id="settingsError" hidden></div>

      <div class="field">
        <label for="setWo">Ort (wo)</label>
        <input type="text" id="setWo">
      </div>
      <div class="field">
        <label for="setUmkreis">Umkreis (km)</label>
        <input type="number" id="setUmkreis" min="1" max="200">
      </div>
      <div class="field">
        <label for="setAngebotsart">Angebotsart</label>
        <select id="setAngebotsart">
          <option value="1">Arbeit</option>
          <option value="2">Selbstständigkeit</option>
          <option value="4">Ausbildung</option>
          <option value="34">Praktikum/Trainee</option>
        </select>
      </div>
      <label class="checkbox-row"><input type="checkbox" id="setZeitarbeit"> Zeitarbeit einschließen</label>
      <label class="checkbox-row"><input type="checkbox" id="setPav"> PAV einschließen</label>

      <div class="field">
        <label for="setExcludeTerms">Globale Ausschlussbegriffe (eine Zeile je Begriff)</label>
        <textarea id="setExcludeTerms" rows="3"></textarea>
      </div>

      <div class="field">
        <label>Suchprofile</label>
        <div id="searchRows"></div>
        <button class="scan secondary" id="addSearchRow" type="button">+ Suchprofil</button>
      </div>

      <div class="modal-actions">
        <button class="scan secondary" id="settingsReset" type="button">Zurücksetzen</button>
        <button class="scan secondary" id="settingsCancel" type="button">Abbrechen</button>
        <button class="scan" id="settingsSave" type="button">Speichern</button>
      </div>
    </div>
  </div>

  <section class="stats">
    <div class="stat fresh"><div class="num" id="nNew">–</div><div class="lbl">neu im Fenster</div></div>
    <div class="stat"><div class="num" id="nTotal">–</div><div class="lbl">beobachtet</div></div>
    <div class="stat"><div class="num" id="nSearch">–</div><div class="lbl">Suchprofile</div></div>
  </section>

  <div class="controls">
    <div class="tabs">
      <button class="tab active" data-bucket="new" id="tabNew">Neu</button>
      <button class="tab" data-bucket="archive" id="tabArch">Archiv</button>
      <button class="tab" data-bucket="saved" id="tabSaved">Gemerkt</button>
      <button class="tab" data-bucket="hidden" id="tabHidden">Versteckt</button>
    </div>
    <span class="grow"></span>
    <select class="filter" id="filter"><option value="">Alle Profile</option></select>
    <select class="filter" id="sort">
      <option value="first_seen">Neueste Funde</option>
      <option value="distance">Entfernung</option>
      <option value="published">Veröffentlichungsdatum</option>
      <option value="entry_date">Eintrittsdatum</option>
    </select>
    <input class="search" id="q" type="search" placeholder="Titel, Firma, Ort …">
  </div>

  <div class="list" id="list"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const UI_STATE_KEY = "jobscanner-ui";
let state = { bucket: "new", q: "", filter: "", sort: "first_seen", window: 24, jobs: [], limit: 100 };

function loadUiState() {
  try {
    const saved = JSON.parse(localStorage.getItem(UI_STATE_KEY) || "{}");
    if (saved.bucket) state.bucket = saved.bucket;
    if (typeof saved.q === "string") state.q = saved.q;
    if (typeof saved.filter === "string") state.filter = saved.filter;
    if (saved.sort) state.sort = saved.sort;
  } catch (e) {}
}
function saveUiState() {
  try {
    localStorage.setItem(UI_STATE_KEY, JSON.stringify({
      bucket: state.bucket, q: state.q, filter: state.filter, sort: state.sort,
    }));
  } catch (e) {}
}

function deAgo(iso) {
  if (!iso) return "";
  const then = new Date(iso), now = new Date();
  const min = Math.max(0, Math.round((now - then) / 60000));
  if (min < 1) return "gerade eben";
  if (min < 60) return `vor ${min} Min`;
  const h = Math.round(min / 60);
  if (h < 24) return `vor ${h} Std`;
  const d = Math.round(h / 24);
  return d === 1 ? "vor 1 Tag" : `vor ${d} Tagen`;
}
function deDate(iso) {
  if (!iso) return "–";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "2-digit" });
}
// freshness colour for the left bar: amber that fades over the new-window
function freshBar(firstSeen) {
  const h = (Date.now() - new Date(firstSeen)) / 3.6e6;
  if (h > state.window) return "var(--hair)";
  const t = 1 - (h / state.window) * 0.7;      // 1.0 → 0.3
  return `rgba(242,169,59,${t.toFixed(2)})`;
}

async function loadStats() {
  try {
    const s = await (await fetch("api/stats")).json();
    state.window = s.new_window_hours || 24;
    $("#nNew").textContent = s.new;
    $("#nTotal").textContent = s.total;
    $("#nSearch").textContent = (s.searches || []).length;
    $("#loc").textContent = `${s.wo || "?"} · ${s.umkreis || "?"} km`;
    $("#status").classList.toggle("live", !!s.scanning);
    $("#statusText").textContent = s.scanning
      ? "scannt …"
      : (s.last_scan ? `Scan ${deAgo(s.last_scan)}` : "noch kein Scan");
    const sel = $("#filter");
    if (sel.options.length <= 1 && s.searches) {
      s.searches.forEach(n => {
        const o = document.createElement("option");
        o.value = o.textContent = n; sel.appendChild(o);
      });
      if (state.filter) sel.value = state.filter;
    }
  } catch (e) { $("#statusText").textContent = "offline"; }
}

async function loadJobs() {
  const url = `api/jobs?bucket=${state.bucket}&limit=${state.limit}`
    + (state.q ? `&q=${encodeURIComponent(state.q)}` : "")
    + (state.filter ? `&search=${encodeURIComponent(state.filter)}` : "");
  let jobs = [];
  try { jobs = await (await fetch(url)).json(); } catch (e) {}
  state.jobs = jobs;
  render(sortJobs(jobs));
}

// sort a copy of the jobs by the selected attribute; entries missing the
// value sort to the end regardless of direction
function sortJobs(jobs) {
  const key = state.sort;
  const asc = key === "distance" || key === "entry_date";
  return [...jobs].sort((a, b) => {
    let av = a[key], bv = b[key];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (key === "distance") return av - bv;
    return asc ? (av < bv ? -1 : av > bv ? 1 : 0)
               : (av > bv ? -1 : av < bv ? 1 : 0);
  });
}

const EMPTY_MESSAGES = {
  new: ["Keine neuen Stellen im Fenster", "Der Scanner läuft weiter — neue Treffer erscheinen hier automatisch."],
  archive: ["Archiv ist leer", "Hier landen Stellen, sobald sie älter als das Neu-Fenster sind."],
  saved: ["Noch nichts gemerkt", "Mit „☆ Merken“ landen Stellen hier zur Wiedervorlage."],
  hidden: ["Nichts versteckt", "Mit „Verstecken“ entfernte Stellen landen hier und können wiederhergestellt werden."],
};

function cardActions(j) {
  if (state.bucket === "hidden") {
    return `<button class="card-btn" data-action="restore" data-refnr="${esc(j.refnr)}">Wiederherstellen</button>`;
  }
  const saved = j.status === "saved";
  return `
    <button class="card-btn${saved ? " active" : ""}" data-action="${saved ? "unsave" : "save"}" data-refnr="${esc(j.refnr)}">${saved ? "★ Gemerkt" : "☆ Merken"}</button>
    <button class="card-btn" data-action="hide" data-refnr="${esc(j.refnr)}">Verstecken</button>`;
}

function render(jobs) {
  const list = $("#list");
  if (!jobs.length) {
    const msg = EMPTY_MESSAGES[state.bucket] || EMPTY_MESSAGES.archive;
    list.innerHTML = `<div class="empty"><div class="big">${msg[0]}</div><div class="sub">${msg[1]}</div></div>`;
    return;
  }
  list.innerHTML = jobs.map(j => {
    const dist = (j.distance != null) ? `<span class="dist">${Math.round(j.distance)} km</span>` : "";
    const ort = [j.plz, j.ort].filter(Boolean).join(" ");
    const archived = state.bucket === "archive";
    const tag = j.external_url ? "a" : "article";
    const link = j.external_url
      ? ` href="${esc(j.external_url)}" target="_blank" rel="noopener"`
      : "";
    return `
      <${tag} class="card${archived ? " archived" : ""}${j.external_url ? " clickable" : ""}"${link} style="border-left-color:${freshBar(j.first_seen)}">
        <div class="seen-badge">entdeckt ${deAgo(j.first_seen)}</div>
        <h3 class="title">${esc(j.title)}</h3>
        <div class="employer">${esc(j.employer)}</div>
        <div class="meta">
          ${ort ? `<span><span class="k">Ort</span> ${esc(ort)}</span>` : ""}
          ${dist}
          <span><span class="k">veröffentlicht</span> ${deDate(j.published)}</span>
          ${j.entry_date ? `<span><span class="k">Eintritt</span> ${deDate(j.entry_date)}</span>` : ""}
          ${cardActions(j)}
        </div>
        ${j.external_url ? `<span class="view-arrow">Ansehen →</span>` : ""}
      </${tag}>`;
  }).join("");
  if (jobs.length === state.limit) {
    list.insertAdjacentHTML("beforeend",
      `<button class="scan secondary load-more" id="loadMore">Mehr laden</button>`);
    $("#loadMore").addEventListener("click", () => { state.limit += 100; loadJobs(); });
  }
}
function esc(s) { return String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c])); }

// events
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  t.classList.add("active");
  state.bucket = t.dataset.bucket;
  state.limit = 100;
  saveUiState();
  loadJobs();
}));
let qTimer;
$("#q").addEventListener("input", e => {
  clearTimeout(qTimer);
  qTimer = setTimeout(() => {
    state.q = e.target.value.trim();
    state.limit = 100;
    saveUiState();
    loadJobs();
  }, 250);
});
$("#filter").addEventListener("change", e => {
  state.filter = e.target.value;
  state.limit = 100;
  saveUiState();
  loadJobs();
});
$("#sort").addEventListener("change", e => {
  state.sort = e.target.value;
  saveUiState();
  render(sortJobs(state.jobs));
});

$("#list").addEventListener("click", async e => {
  const btn = e.target.closest(".card-btn");
  if (!btn) return;
  e.preventDefault();
  e.stopPropagation();
  const refnr = btn.dataset.refnr;
  const status = { save: "saved", unsave: null, hide: "hidden", restore: null }[btn.dataset.action];
  btn.disabled = true;
  try {
    await fetch(`api/jobs/${encodeURIComponent(refnr)}/status`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status }),
    });
  } catch (err) {}
  loadJobs();
});
function triggerScan(body) {
  const scanBtn = $("#scanBtn"), deepBtn = $("#deepBtn");
  const prevScan = scanBtn.textContent, prevDeep = deepBtn.textContent;
  scanBtn.disabled = true; deepBtn.disabled = true;
  scanBtn.textContent = "scannt …";
  fetch("api/scan", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body || {}),
  }).catch(() => {});
  const poll = setInterval(async () => {
    await loadStats();
    if (!$("#status").classList.contains("live")) {
      clearInterval(poll);
      scanBtn.disabled = false; deepBtn.disabled = false;
      scanBtn.textContent = prevScan; deepBtn.textContent = prevDeep;
      loadJobs();
    }
  }, 1500);
}

$("#scanBtn").addEventListener("click", () => triggerScan());

function showModal(el) { el.hidden = false; document.body.classList.add("modal-open"); }
function hideModal(el) { el.hidden = true; document.body.classList.remove("modal-open"); }

$("#deepBtn").addEventListener("click", () => showModal($("#modalBackdrop")));
$("#deepCancel").addEventListener("click", () => hideModal($("#modalBackdrop")));
$("#modalBackdrop").addEventListener("click", e => {
  if (e.target === $("#modalBackdrop")) hideModal($("#modalBackdrop"));
});
$("#deepStart").addEventListener("click", () => {
  const days = Math.max(0, Math.min(90, parseInt($("#deepDays").value, 10) || 0));
  hideModal($("#modalBackdrop"));
  triggerScan({ days });
});

function searchRowHtml(s) {
  s = s || {};
  const esc = v => (v ?? "").toString().replace(/"/g, "&quot;");
  return `
    <div class="search-row">
      <input type="text" class="s-name" placeholder="Name" value="${esc(s.name)}">
      <input type="text" class="s-query" placeholder="Suchbegriff" value="${esc(s.query)}">
      <input type="text" class="s-exclude" placeholder="Ausschluss (Komma-getrennt)" value="${esc((s.exclude || []).join(", "))}">
      <button class="scan secondary s-remove" type="button" title="Entfernen">✕</button>
    </div>`;
}
function renderSearchRows(searches) {
  $("#searchRows").innerHTML = (searches || []).map(searchRowHtml).join("");
}
$("#addSearchRow").addEventListener("click", () => {
  $("#searchRows").insertAdjacentHTML("beforeend", searchRowHtml());
});
$("#searchRows").addEventListener("click", e => {
  if (e.target.classList.contains("s-remove")) {
    e.target.closest(".search-row").remove();
  }
});

function showSettingsError(msg) {
  const el = $("#settingsError");
  if (msg) { el.textContent = msg; el.hidden = false; }
  else { el.textContent = ""; el.hidden = true; }
}

function populateSettings(s) {
  $("#setWo").value = s.wo || "";
  $("#setUmkreis").value = s.umkreis ?? "";
  $("#setAngebotsart").value = String(s.angebotsart ?? 1);
  $("#setZeitarbeit").checked = !!s.include_zeitarbeit;
  $("#setPav").checked = !!s.include_pav;
  $("#setExcludeTerms").value = (s.exclude_terms || []).join("\n");
  renderSearchRows(s.searches || []);
}

async function openSettings() {
  showSettingsError(null);
  try {
    const s = await fetch("api/settings").then(r => r.json());
    populateSettings(s);
    showModal($("#settingsBackdrop"));
  } catch (err) {
    showSettingsError("Einstellungen konnten nicht geladen werden.");
  }
}

function collectSettings() {
  const searches = [...document.querySelectorAll("#searchRows .search-row")].map(row => ({
    name: row.querySelector(".s-name").value.trim(),
    query: row.querySelector(".s-query").value.trim(),
    exclude: row.querySelector(".s-exclude").value.split(",").map(t => t.trim()).filter(Boolean),
  }));
  return {
    wo: $("#setWo").value.trim(),
    umkreis: parseInt($("#setUmkreis").value, 10),
    angebotsart: parseInt($("#setAngebotsart").value, 10),
    include_zeitarbeit: $("#setZeitarbeit").checked,
    include_pav: $("#setPav").checked,
    exclude_terms: $("#setExcludeTerms").value.split("\n").map(t => t.trim()).filter(Boolean),
    searches,
  };
}

async function saveSettings() {
  showSettingsError(null);
  try {
    const res = await fetch("api/settings", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(collectSettings()),
    });
    const body = await res.json();
    if (!res.ok || !body.ok) {
      showSettingsError(body.error || "Einstellungen konnten nicht gespeichert werden.");
      return;
    }
    hideModal($("#settingsBackdrop"));
    loadStats(); loadJobs();
  } catch (err) {
    showSettingsError("Einstellungen konnten nicht gespeichert werden.");
  }
}

async function resetSettings() {
  showSettingsError(null);
  try {
    const res = await fetch("api/settings", { method: "DELETE" });
    const body = await res.json();
    if (!res.ok || !body.ok) {
      showSettingsError("Zurücksetzen fehlgeschlagen.");
      return;
    }
    populateSettings(body.settings);
    loadStats(); loadJobs();
  } catch (err) {
    showSettingsError("Zurücksetzen fehlgeschlagen.");
  }
}

$("#settingsBtn").addEventListener("click", openSettings);
$("#settingsCancel").addEventListener("click", () => hideModal($("#settingsBackdrop")));
$("#settingsBackdrop").addEventListener("click", e => {
  if (e.target === $("#settingsBackdrop")) hideModal($("#settingsBackdrop"));
});
$("#settingsSave").addEventListener("click", saveSettings);
$("#settingsReset").addEventListener("click", resetSettings);

loadUiState();
document.querySelectorAll(".tab").forEach(t => {
  t.classList.toggle("active", t.dataset.bucket === state.bucket);
});
$("#q").value = state.q;
$("#sort").value = state.sort;

loadStats(); loadJobs();
setInterval(loadStats, 30000);
</script>
</body>
</html>
